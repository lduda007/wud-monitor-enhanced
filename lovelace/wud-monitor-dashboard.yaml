# ---------------------------------------------------------------------------
# WUD Monitor Enhanced — dashboard card
# ---------------------------------------------------------------------------
# A single, fully dynamic Lovelace card for the "wud_monitor" integration.
# It auto-discovers every container sensor (no need to list entities by hand),
# groups them by instance and watcher, and inside each group splits them into
# "Update Available" and "Up to date". Each container row shows the current
# version (-> new version, plus "(Nd ago)" when an update exists). The name
# card's icon is the container's WUD display_icon: Material Design Icons (mdi:)
# render natively; Font Awesome (fa:) and Simple Icons (si:) are fetched as SVGs
# from the Iconify API (api.iconify.design) and shown as a picture; anything
# missing/unrecognised falls back to a package icon. Either way the icon is
# colour-coded by severity (semver_diff): red=major, amber=patch,
# orange=minor/unknown, green=up to date. Icon-only buttons per row:
#   • magnify-scan  — Rescan: re-checks that container for updates (Force Scan);
#                       asks to confirm first

#   • note-text-outline — Release notes: opens the container's release-notes URL
#                       in a new tab (only shown when an update is available)
#   • tray-arrow-down — Update: runs the container's WUD trigger (asks to confirm
#                       first). One Update button per available trigger.
# Containers WUD reported an error for (e.g. a registry rate limit) are pulled
# out of the watcher groups into a collapsible "Errors" section per instance,
# flagged with a red alert icon; expand it to read each error message. Each
# errored row also gets a magnify-scan button to force a rescan / retry. The
# Errors section defaults to expanded so it stays visible after the card
# re-renders (e.g. following a rescan). Collapsible sections also set an
# expander-card `expand-id`, which persists a manual open/close in the browser's
# LocalStorage — but only on expander-card versions new enough to support it.
# Per-instance controls at the top of each section:
#   • Force Scan All        • Refresh States
# and summary chips: containers with updates / monitored / last poll.
#
# Requirements (install via HACS → Frontend):
#   • auto-entities   (thomasloven/lovelace-auto-entities)
#   • Mushroom        (piitaya/lovelace-mushroom)
#   • expander-card   (Alia5/lovelace-expander-card)  — collapsible "Up to date"
#   • card-mod        (thomasloven/lovelace-card-mod)  — OPTIONAL: widens the
#       error message vs its rescan button (~80/20); without it the error rows
#       just fall back to a 50/50 split.
#
# Note: rows whose WUD display_icon is a Font Awesome (fa:) or Simple Icon (si:)
# make an outbound request to api.iconify.design to fetch the icon SVG. Rows with
# a Material Design Icon (mdi:) — WUD's default — need no external request.
#
# How to use:
#   Dashboard -> Edit -> Add Card -> Manual, then paste this file's contents.
#   (Or add it under a view's `cards:` in YAML-mode dashboards.)
#
# Filtering by instance:
#   By default the card shows every WUD instance it discovers. To restrict it to
#   one or more specific instances, edit the `include_instances` list near the top
#   of the template below, e.g.:
#       {% set include_instances = ["Home Server", "NAS"] %}
#   Names must match the integration's instance_name exactly (case-sensitive).
#   Leave the list empty (`[]`) to show all instances.
#
# IMPORTANT: the template ends with `{{ ns.cards }}` — do NOT pipe it through
# `| tojson`. auto-entities parses the plain (Python-style) output directly;
# `tojson` produces \uXXXX escapes that its YAML parser rejects, which makes
# every generated card fail with "Configuration error".
# ---------------------------------------------------------------------------

type: custom:auto-entities
card:
  type: vertical-stack
card_param: cards
filter:
  template: |
    {# ---- CONFIG: restrict the card to specific instances ----
       List the instance_name(s) you want to display (exact, case-sensitive),
       e.g. ["Home Server", "NAS"]. Leave empty to show every instance. #}
    {% set include_instances = [] %}

    {% set ns = namespace(cards=[]) %}
    {% set ns.cards = ns.cards + [{
      "type": "custom:mushroom-title-card",
      "title": "WUD Monitor Enhanced"
    }] %}

    {# All per-container sensors expose these attributes; controller sensors do not. #}
    {% set sensors = states.sensor
         | selectattr('attributes.instance_name', 'defined')
         | selectattr('attributes.watcher', 'defined')
         | selectattr('attributes.update_available', 'defined')
         | list %}

    {% set instances = sensors | map(attribute='attributes.instance_name') | unique | list | sort %}
    {% if include_instances | count %}
      {% set instances = instances | select('in', include_instances) | list %}
    {% endif %}
    {% for inst in instances %}
      {% set inst_sensors = sensors | selectattr('attributes.instance_name', 'equalto', inst) | list %}

      {# Containers WUD reported an error for are pulled out into their own
         section below; the normal watcher groups only show healthy containers. #}
      {% set err_sensors = inst_sensors | selectattr('attributes.error', 'defined') | list %}
      {% set normal_sensors = inst_sensors | rejectattr('attributes.error', 'defined') | list %}

      {# ---- instance header + controls ---- #}
      {% set updates_here = inst_sensors | selectattr('attributes.update_available', 'equalto', true) | list | count %}
      {% set ns.cards = ns.cards + [{
        "type": "custom:mushroom-title-card",
        "title": inst,
        "subtitle": updates_here ~ " update(s) across " ~ (inst_sensors | count) ~ " container(s)"
      }] %}

      {% set updates_sensor = states.sensor | selectattr('name', 'equalto', 'WUD @ ' ~ inst ~ ' Containers with Updates') | map(attribute='entity_id') | list %}
      {% set total_sensor   = states.sensor | selectattr('name', 'equalto', 'WUD @ ' ~ inst ~ ' Monitored Containers') | map(attribute='entity_id') | list %}
      {% set poll_sensor    = states.sensor | selectattr('name', 'equalto', 'WUD @ ' ~ inst ~ ' Last Poll') | map(attribute='entity_id') | list %}
      {% set scan_all_btn   = states.button | selectattr('name', 'equalto', 'WUD @ ' ~ inst ~ ' Force Scan All') | map(attribute='entity_id') | list %}
      {% set refresh_btn    = states.button | selectattr('name', 'equalto', 'WUD @ ' ~ inst ~ ' Refresh States') | map(attribute='entity_id') | list %}

      {% set summary = namespace(cards=[]) %}
      {% if updates_sensor | count %}
        {% set summary.cards = summary.cards + [{"type":"custom:mushroom-entity-card","entity":updates_sensor[0],"name":"Updates","icon":"mdi:package-up","icon_color":"orange"}] %}
      {% endif %}
      {% if total_sensor | count %}
        {% set summary.cards = summary.cards + [{"type":"custom:mushroom-entity-card","entity":total_sensor[0],"name":"Monitored","icon":"mdi:docker","icon_color":"blue"}] %}
      {% endif %}
      {% if poll_sensor | count %}
        {% set summary.cards = summary.cards + [{"type":"custom:mushroom-entity-card","entity":poll_sensor[0],"name":"Last poll","icon":"mdi:clock-outline","icon_color":"grey"}] %}
      {% endif %}
      {% if summary.cards | count %}
        {% set ns.cards = ns.cards + [{"type":"horizontal-stack","cards": summary.cards}] %}
      {% endif %}

      {% set controls = namespace(cards=[]) %}
      {% if scan_all_btn | count %}
        {% set controls.cards = controls.cards + [{"type":"custom:mushroom-template-card","primary":"Force Scan All","icon":"mdi:radar","icon_color":"teal","tap_action":{"action":"call-service","service":"button.press","target":{"entity_id":scan_all_btn[0]}}}] %}
      {% endif %}
      {% if refresh_btn | count %}
        {% set controls.cards = controls.cards + [{"type":"custom:mushroom-template-card","primary":"Refresh States","icon":"mdi:database-refresh","icon_color":"indigo","tap_action":{"action":"call-service","service":"button.press","target":{"entity_id":refresh_btn[0]}}}] %}
      {% endif %}
      {% if controls.cards | count %}
        {% set ns.cards = ns.cards + [{"type":"horizontal-stack","cards": controls.cards}] %}
      {% endif %}

      {# ---- watcher groups ---- #}
      {% set watchers = normal_sensors | map(attribute='attributes.watcher') | unique | list | sort %}
      {% for w in watchers %}
        {% set group = normal_sensors | selectattr('attributes.watcher', 'equalto', w) | list %}

        {% for status in [true, false] %}
          {% set rows = group | selectattr('attributes.update_available', 'equalto', status) | list | sort(attribute='name') %}
          {% if rows | count %}
            {# Watcher name is folded into the status header (with a middot) so it
               shares one title row instead of stacking a second, padded card. #}
            {% set label = ("Update Available (" ~ (rows|count) ~ ")") if status else ("Up to date (" ~ (rows|count) ~ ")") %}
            {% set header = w ~ " · " ~ label %}
            {% set grp = namespace(cards=[]) %}

            {% for s in rows %}
              {% set base = s.name | replace(' Update Available', '') %}
              {% set disp = base[(inst|length + 1):] if base.startswith(inst ~ ' ') else base %}
              {% set cur = s.attributes.current_version %}
              {% set new = s.attributes.new_version %}
              {% set scan_btn = states.button | selectattr('name', 'equalto', base ~ ' Force Scan') | map(attribute='entity_id') | list %}

              {# Severity colour from semver_diff; days since the update appeared. #}
              {% set sev = s.attributes.semver_diff %}
              {% set name_color = ("red" if sev == "major" else "amber" if sev == "patch" else "orange") if status else "green" %}
              {% set days = s.attributes.days_available %}
              {% set ver = (cur ~ " -> " ~ new) if status else cur %}
              {% set ver = (ver ~ " (" ~ days ~ "d ago)") if (status and days is defined) else ver %}

              {# Container icon from WUD's display_icon. HA renders Material Design
                 Icons (mdi:) natively in the icon slot (theme-aware, colourable);
                 Font Awesome (fa:) and Simple Icons (si:) aren't native, so they're
                 rendered as a picture via the Iconify API. Iconify's own prefixes
                 match WUD's for mdi/fa, so only si -> simple-icons needs remapping.
                 ?color= tints fa/si to the same severity colour as the mdi glyphs
                 so the whole list reads as one system. Falls back to a package icon
                 when display_icon is missing or in an unexpected format. #}
              {% set di = s.attributes.display_icon %}
              {% set row_icon = none %}
              {% set row_pic  = none %}
              {% if di and ':' in di %}
                {% set pfx = di.split(':')[0] %}
                {% set nm  = di.split(':', 1)[1] %}
                {% if pfx == 'mdi' %}
                  {% set row_icon = di %}
                {% else %}
                  {% set ipfx = 'simple-icons' if pfx == 'si' else pfx %}
                  {% set icol = 'orange' if name_color == 'amber' else name_color %}
                  {% set row_pic = 'https://api.iconify.design/' ~ ipfx ~ '/' ~ nm ~ '.svg?color=' ~ icol %}
                {% endif %}
              {% endif %}
              {% if not row_icon and not row_pic %}
                {% set row_icon = 'mdi:package-up' if status else 'mdi:package-variant-closed' %}
              {% endif %}

              {# Name / version card — gets 50% of the row width. #}
              {% set name_card = {
                "type": "custom:mushroom-template-card",
                "entity": s.entity_id,
                "primary": disp,
                "secondary": ver,
                "icon": row_icon,
                "picture": row_pic,
                "icon_color": name_color,
                "multiline_secondary": true,
                "tap_action": {"action": "more-info"}
              } %}

              {# Buttons are icon-only and packed into their own inner stack, so
                 they share the other 50% and stay compact no matter how many. #}
              {% set btns = namespace(cards=[]) %}
              {% if scan_btn | count %}
                {% set btns.cards = btns.cards + [{
                  "type": "custom:mushroom-template-card",
                  "layout": "vertical",
                  "icon": "mdi:magnify-scan",
                  "icon_color": "blue",
                  "tap_action": {"action":"call-service","service":"button.press","target":{"entity_id": scan_btn[0]},
                                 "confirmation": {"text": "Rescan " ~ disp ~ "?"}}
                }] %}
              {% endif %}

              {# Release-notes link — only present when an update is available. #}
              {% set rel = s.attributes.release_notes | default(none) %}
              {% if rel %}
                {% set btns.cards = btns.cards + [{
                  "type": "custom:mushroom-template-card",
                  "layout": "vertical",
                  "icon": "mdi:note-text-outline",
                  "icon_color": "purple",
                  "tap_action": {"action":"url","url_path": rel}
                }] %}
              {% endif %}

              {% set trigs = s.attributes.available_triggers or [] %}
              {% for trig in trigs %}
                {% set upd_btn = states.button | selectattr('name', 'equalto', base ~ ' Trigger ' ~ trig) | map(attribute='entity_id') | list %}
                {% if upd_btn | count %}
                  {% set btns.cards = btns.cards + [{
                    "type": "custom:mushroom-template-card",
                    "layout": "vertical",
                    "icon": "mdi:tray-arrow-down",
                    "icon_color": "red" if status else "grey",
                    "tap_action": {"action":"call-service","service":"button.press","target":{"entity_id": upd_btn[0]},
                                   "confirmation": {"text": "Run '" ~ trig ~ "' on " ~ disp ~ "?"}}
                  }] %}
                {% endif %}
              {% endfor %}

              {% if btns.cards | count %}
                {% set grp.cards = grp.cards + [{"type": "horizontal-stack", "cards": [
                  name_card, {"type": "horizontal-stack", "cards": btns.cards}
                ]}] %}
              {% else %}
                {% set grp.cards = grp.cards + [name_card] %}
              {% endif %}
            {% endfor %}

            {# "Update Available" stays open; "Up to date" collapses by default. #}
            {% if status %}
              {% set ns.cards = ns.cards + [{"type": "custom:mushroom-title-card", "subtitle": header}] + grp.cards %}
            {% else %}
              {# expand-id persists the open/closed state in the browser so it
                 survives the card re-rendering on every poll / button press. #}
              {% set ns.cards = ns.cards + [{
                "type": "custom:expander-card",
                "expanded": false,
                "expand-id": "wud-uptodate-" ~ inst ~ "-" ~ w,
                "title": header,
                "cards": grp.cards
              }] %}
            {% endif %}
          {% endif %}
        {% endfor %}
      {% endfor %}

      {# ---- containers WUD couldn't check (errors) ---- #}
      {% if err_sensors | count %}
        {% set egrp = namespace(cards=[]) %}
        {% for s in err_sensors | sort(attribute='name') %}
          {% set base = s.name | replace(' Update Available', '') %}
          {% set disp = base[(inst|length + 1):] if base.startswith(inst ~ ' ') else base %}
          {% set scan_btn = states.button | selectattr('name', 'equalto', base ~ ' Force Scan') | map(attribute='entity_id') | list %}
          {# Error text is shown as the (multiline) secondary — revealed when the
             section is expanded; tapping opens more-info for full detail. #}
          {% set err_card = {
            "type": "custom:mushroom-template-card",
            "entity": s.entity_id,
            "primary": disp,
            "secondary": s.attributes.error,
            "icon": "mdi:alert-circle",
            "icon_color": "red",
            "multiline_secondary": true,
            "tap_action": {"action": "more-info"}
          } %}
          {# A Force Scan (rescan) button lets you retry a failed container. #}
          {% if scan_btn | count %}
            {% set scan_card = {
              "type": "custom:mushroom-template-card",
              "layout": "vertical",
              "icon": "mdi:magnify-scan",
              "icon_color": "blue",
              "tap_action": {"action":"call-service","service":"button.press","target":{"entity_id": scan_btn[0]},
                             "confirmation": {"text": "Rescan " ~ disp ~ "?"}}
            } %}
            {# card_mod turns the 50/50 stack into an ~80/20 grid so the error
               message gets most of the width. If card_mod isn't installed the
               key is ignored and the row simply falls back to 50/50. #}
            {% set egrp.cards = egrp.cards + [{
              "type": "horizontal-stack",
              "cards": [err_card, scan_card],
              "card_mod": {"style": "#root { display: grid !important; grid-template-columns: 4fr 1fr !important; }"}
            }] %}
          {% else %}
            {% set egrp.cards = egrp.cards + [err_card] %}
          {% endif %}
        {% endfor %}
        {# Errors default to expanded so a card re-render (e.g. after a rescan)
           re-opens the section instead of collapsing it — errors matter enough
           to stay visible. expand-id additionally persists a manual collapse,
           but only on expander-card versions new enough to support it. #}
        {% set ns.cards = ns.cards + [{
          "type": "custom:expander-card",
          "expanded": true,
          "expand-id": "wud-errors-" ~ inst,
          "title": "⚠ Errors (" ~ (err_sensors | count) ~ ")",
          "cards": egrp.cards
        }] %}
      {% endif %}
    {% endfor %}

    {% if sensors | count == 0 %}
      {% set ns.cards = ns.cards + [{
        "type": "markdown",
        "content": "No WUD container sensors found. Make sure the **WUD Monitor Enhanced** integration is set up and has polled at least once."
      }] %}
    {% endif %}

    {{ ns.cards }}